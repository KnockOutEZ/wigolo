<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Weeknight Lentil Soup</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Person",
          "@id": "#author",
          "name": "Sam Patel"
        },
        {
          "@type": "Recipe",
          "name": "Weeknight Lentil Soup",
          "author": { "@id": "#author" },
          "recipeIngredient": [
            "1 cup brown lentils",
            "1 yellow onion, diced",
            "2 carrots, diced",
            "4 cups vegetable broth",
            "1 tsp cumin"
          ],
          "recipeInstructions": [
            "Saute onion and carrots in olive oil for 5 minutes.",
            "Add lentils, broth, and cumin; simmer 30 minutes.",
            "Season to taste and serve hot."
          ]
        }
      ]
    }
    </script>
