<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cookie Banner Test Page</title>
  <style>
    .cookie-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cookie-dialog {
      background: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .cookie-accept {
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
    .hidden { display: none !important; }
    .main-content { padding: 20px; }
  </style>
</head>
<body>
  <div id="cookie-overlay" class="cookie-overlay">
    <div class="cookie-dialog">
      <p>We use cookies to improve your experience.</p>
      <button class="cookie-accept" onclick="document.getElementById('cookie-overlay').classList.add('hidden')">Accept Cookies</button>
    </div>
  </div>
  <div class="main-content">
    <h1>Article Title</h1>
    <p>This is the main article content that should be extracted after dismissing the cookie banner.</p>
    <p>It contains multiple paragraphs of meaningful text for testing purposes.</p>
    <a href="/other-page">Link to other page</a>
  </div>
</body>
</html>
